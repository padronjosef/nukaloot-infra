services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - web

  web:
    build:
      context: ../game-price-web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:3000
    depends_on:
      - api

  api:
    build:
      context: ../game-price-api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"

volumes:
  letsencrypt:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /etc/letsencrypt
  certbot-webroot:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/certbot
